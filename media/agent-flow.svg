<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Hooligan Agent message automation flow</title>
  <desc id="desc">A privacy-safe architecture diagram showing how Hooligan Agent routes messages through validation, scheduling, plugins, and iMessage automation boundaries.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#fbbf24"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>
  <rect width="1200" height="675" rx="36" fill="url(#bg)"/>
  <circle cx="1030" cy="90" r="210" fill="#f43f5e" opacity="0.09"/>
  <circle cx="155" cy="555" r="230" fill="#f59e0b" opacity="0.08"/>
  <text x="76" y="86" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="800">Hooligan Agent</text>
  <text x="76" y="124" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="18">Privacy-safe view of the local message automation boundary</text>

  <g font-family="Inter, Arial, sans-serif" filter="url(#shadow)">
    <g transform="translate(90 220)">
      <rect width="180" height="130" rx="24" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="43" fill="#f8fafc" font-size="20" font-weight="700">Trigger</text>
      <text x="24" y="74" fill="#94a3b8" font-size="14">CLI command</text>
      <text x="24" y="98" fill="#94a3b8" font-size="14">watcher event</text>
    </g>
    <g transform="translate(330 220)">
      <rect width="180" height="130" rx="24" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="43" fill="#f8fafc" font-size="20" font-weight="700">Validate</text>
      <text x="24" y="74" fill="#94a3b8" font-size="14">recipient checks</text>
      <text x="24" y="98" fill="#94a3b8" font-size="14">temp-file safety</text>
    </g>
    <g transform="translate(570 220)">
      <rect width="180" height="130" rx="24" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="43" fill="#f8fafc" font-size="20" font-weight="700">Route</text>
      <text x="24" y="74" fill="#94a3b8" font-size="14">plugins</text>
      <text x="24" y="98" fill="#94a3b8" font-size="14">scheduler</text>
    </g>
    <g transform="translate(810 220)">
      <rect width="180" height="130" rx="24" fill="url(#card)" stroke="#334155"/>
      <text x="24" y="43" fill="#f8fafc" font-size="20" font-weight="700">Execute</text>
      <text x="24" y="74" fill="#94a3b8" font-size="14">AppleScript</text>
      <text x="24" y="98" fill="#94a3b8" font-size="14">Messages app</text>
    </g>
    <g transform="translate(1010 220)">
      <rect width="100" height="130" rx="24" fill="url(#accent)"/>
      <text x="23" y="48" fill="#111827" font-size="20" font-weight="800">Log</text>
      <text x="23" y="80" fill="#111827" font-size="14">status</text>
      <text x="23" y="103" fill="#111827" font-size="14">errors</text>
    </g>
  </g>

  <g stroke="#fbbf24" stroke-width="3" marker-end="url(#arrow)" opacity="0.9">
    <line x1="272" y1="285" x2="320" y2="285"/>
    <line x1="512" y1="285" x2="560" y2="285"/>
    <line x1="752" y1="285" x2="800" y2="285"/>
    <line x1="992" y1="285" x2="1000" y2="285"/>
  </g>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="180" y="445" width="840" height="92" rx="26" fill="#020617" opacity="0.72" stroke="#334155"/>
    <text x="220" y="483" fill="#f8fafc" font-size="22" font-weight="700">Public media rule</text>
    <text x="220" y="516" fill="#cbd5e1" font-size="17">No real contacts, message contents, phone numbers, or private conversation screenshots are needed to explain the system.</text>
  </g>
</svg>
